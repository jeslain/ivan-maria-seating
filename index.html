<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ivory:#FAF8F4;--deep:#1C1712;--gold:#C9A84C;--gold-light:#E8D5A3;
  --gold-pale:#F5EDD6;--text:#3A3028;--muted:#8A7B6E;--border:#EDE8E0;
}
html{font-size:16px;-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{
  background:var(--ivory);color:var(--text);
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;min-height:100dvh;
  /* safe area for notched phones */
  padding-bottom:env(safe-area-inset-bottom,0px);
}

/* HEADER */
header{
  background:var(--deep);
  padding:calc(env(safe-area-inset-top,0px) + 20px) 20px 18px;
  text-align:center;position:sticky;top:0;z-index:100;
}
.eyebrow{
  font-size:10px;font-weight:500;letter-spacing:.2em;
  text-transform:uppercase;color:var(--gold);margin-bottom:5px;
}
header h1{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:clamp(22px,6vw,30px);font-weight:300;
  color:var(--ivory);letter-spacing:.02em;line-height:1.1;
}
header h1 em{font-style:italic;font-weight:400}
header .sub{font-size:11px;color:var(--gold-light);margin-top:3px;letter-spacing:.05em}

/* SEARCH */
.search-wrap{padding:16px 16px 0}
.search-inner{
  position:relative;background:#fff;border-radius:12px;
  border:1.5px solid var(--gold-light);overflow:hidden;
  transition:border-color .2s,box-shadow .2s;
}
.search-inner:focus-within{
  border-color:var(--gold);
  box-shadow:0 0 0 3px rgba(201,168,76,.12);
}
.search-icon{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  color:var(--muted);width:18px;height:18px;pointer-events:none;flex-shrink:0;
}
#searchInput{
  width:100%;border:none;outline:none;
  font-family:'Inter',system-ui,sans-serif;
  font-size:16px;/* must be >=16px to prevent iOS auto-zoom */
  color:var(--deep);padding:14px 40px 14px 42px;
  background:transparent;-webkit-appearance:none;appearance:none;
}
#searchInput::placeholder{color:var(--muted)}
.clear-btn{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  background:var(--gold-pale);border:none;border-radius:50%;
  width:26px;height:26px;display:none;align-items:center;
  justify-content:center;cursor:pointer;color:var(--muted);font-size:13px;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.clear-btn.visible{display:flex}

/* HINT */
.hint{
  padding:10px 16px 0;font-size:12px;color:var(--muted);
  text-align:center;letter-spacing:.02em;min-height:22px;
}

/* RESULTS */
#results{padding:12px 16px calc(80px + env(safe-area-inset-bottom,0px))}

/* IDLE */
.idle-state{text-align:center;padding:32px 0 0}
.idle-ring{width:64px;height:64px;margin:0 auto 14px;display:block}
.idle-state h2{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:20px;font-weight:400;color:var(--deep);margin-bottom:6px;
}
.idle-state p{font-size:13px;color:var(--muted);line-height:1.6;max-width:240px;margin:0 auto}

/* NO RESULTS */
.no-results{text-align:center;padding:32px 0 0}
.no-results p{font-size:14px;color:var(--muted);line-height:1.6}
.no-results strong{color:var(--text);font-weight:500}

/* CARD */
.result-card{
  background:#fff;border-radius:14px;border:1px solid var(--border);
  margin-bottom:10px;overflow:hidden;
  animation:slideUp .18s ease both;
}
@keyframes slideUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.card-top{display:flex;align-items:center;gap:12px;padding:14px 16px}
.table-badge{
  flex-shrink:0;width:52px;height:52px;border-radius:50%;
  background:var(--deep);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:1px;
}
.table-badge .lbl{
  font-size:7px;font-weight:500;letter-spacing:.14em;
  text-transform:uppercase;color:var(--gold);
}
.table-badge .num{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:21px;font-weight:600;color:var(--ivory);line-height:1;
}
.card-info{flex:1;min-width:0}
.guest-name{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:19px;font-weight:400;color:var(--deep);
  line-height:1.2;margin-bottom:2px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.seat-desc{font-size:11px;color:var(--muted);letter-spacing:.02em}

/* MAP TOGGLE */
.map-toggle{
  width:100%;border:none;border-top:1px solid var(--border);
  background:var(--gold-pale);padding:11px 16px;
  display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;
  font-family:'Inter',system-ui,sans-serif;
  font-size:12px;font-weight:500;color:var(--text);letter-spacing:.04em;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  transition:background .15s;
}
.map-toggle:active{background:var(--gold-light)}
.map-toggle .chevron{transition:transform .2s;color:var(--gold);font-size:14px}
.map-toggle.open .chevron{transform:rotate(180deg)}

/* MAP PANEL */
.map-panel{display:none;padding:14px 16px 18px;border-top:1px solid var(--border);background:#FDFCFA}
.map-panel.open{display:block}
.floor-map{width:100%;max-width:360px;margin:0 auto;display:block;height:auto;overflow:visible}

/* TABLEMATES */
.tablemates{margin-top:14px;padding-top:12px;border-top:1px dashed var(--border)}
.tm-label{
  font-size:10px;font-weight:500;letter-spacing:.14em;
  text-transform:uppercase;color:var(--muted);margin-bottom:8px;
}
.tm-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px 10px}
.tm-item{font-size:12px;color:var(--text);padding:2px 0;line-height:1.4}
.tm-item.me{color:var(--gold);font-weight:500}

/* RESULTS COUNT */
.results-count{
  font-size:12px;color:var(--muted);
  margin-bottom:10px;text-align:center;letter-spacing:.03em;
}

/* FOOTER */
footer{
  position:fixed;bottom:0;left:0;right:0;
  background:linear-gradient(transparent,var(--ivory) 50%);
  padding:16px 20px calc(16px + env(safe-area-inset-bottom,0px));
  text-align:center;pointer-events:none;
}
footer p{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:12px;font-style:italic;color:var(--muted);
}

/* QR MODAL */
.qr-btn{
  display:block;margin:16px auto 0;padding:9px 20px;
  background:transparent;border:1px solid var(--gold-light);
  border-radius:20px;font-size:11px;font-weight:500;
  letter-spacing:.08em;text-transform:uppercase;color:var(--muted);
  cursor:pointer;-webkit-tap-highlight-color:transparent;
}
.qr-overlay{
  display:none;position:fixed;inset:0;background:rgba(28,23,18,.85);
  z-index:200;align-items:center;justify-content:center;padding:20px;
}
.qr-overlay.open{display:flex}
.qr-box{
  background:var(--ivory);border-radius:16px;padding:28px 24px 20px;
  text-align:center;max-width:280px;width:100%;
}
.qr-box h3{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:18px;font-weight:400;color:var(--deep);margin-bottom:4px;
}
.qr-box p{font-size:12px;color:var(--muted);margin-bottom:16px;line-height:1.5}
.qr-img{width:180px;height:180px;border-radius:8px;display:block;margin:0 auto}
.qr-url{
  font-size:10px;color:var(--muted);margin-top:10px;
  word-break:break-all;font-style:italic;
}
.qr-close{
  margin-top:14px;background:var(--deep);color:var(--gold);
  border:none;border-radius:8px;padding:10px 24px;
  font-size:12px;font-weight:500;letter-spacing:.08em;cursor:pointer;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
@media(prefers-reduced-motion:reduce){
  .result-card{animation:none}
  .map-toggle .chevron{transition:none}
}
</style>

// Left side: T1(back-left), T2(mid-left upper), T3(mid-left lower), T4(lower-left centre), T5(far left lower), T6(lower-left near floor)
// Right side: T14(back-right), T13(mid-right upper), T12(far right mid), T10(right mid), T11(centre-right), T8(right lower)
// Centre/bottom: T7(stage-left cluster), T9(centre below floor), T15(centre lower)
const TPOS={
  1:{x:38, y:42},   // far left, near stage
  2:{x:52, y:108},  // left, upper-middle
  3:{x:40, y:158},  // left, mid-lower
  4:{x:68, y:210},  // left-centre, below dance floor
  5:{x:38, y:255},  // far left, lower
  6:{x:78, y:258},  // centre-left, lower
  7:{x:110,y:310},  // centre-left bottom (near stage side)
  8:{x:240,y:255},  // right side, lower
  9:{x:158,y:258},  // centre, below dance floor
  10:{x:258,y:158}, // right side, mid
  11:{x:218,y:208}, // centre-right, beside dance floor
  12:{x:262,y:108}, // far right, middle
  13:{x:222,y:108}, // centre-right, upper (near stage)
  14:{x:262,y:42},  // far right, near stage
  15:{x:170,y:310}, // centre, lower
};

// ── ACCURATE LOCATION DESCRIPTIONS ─────────────────────────────────────────
const TDESC={
  1:"Far left, back corner near stage",
  2:"Left side, upper section",
  3:"Left side, middle section",
  4:"Left-centre, below the dance floor",
  5:"Far left, lower section",
  6:"Centre-left, lower section",
  7:"Centre-left, front near the stage",
  8:"Right side, lower section",
  9:"Centre, below the dance floor",
  10:"Right side, middle section",
  11:"Centre-right, beside the dance floor",
  12:"Far right, middle section",
  13:"Centre-right, upper section near stage",
  14:"Far right, back corner near stage",
  15:"Centre, lower-middle area",
};

// ── BUILD SVG MAP ────────────────────────────────────────────────────────────
function buildMap(hi){
  const W=300,H=340;
  let s=`<svg class="floor-map" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Floor plan showing table ${hi}">`;
  // Room
  s+=`<rect x="1" y="1" width="${W-2}" height="${H-2}" rx="6" fill="#FDFCF8" stroke="#E8E0D4" stroke-width="1"/>`;
  // Stage (top centre)
  s+=`<rect x="98" y="6" width="104" height="28" rx="3" fill="#1C1712" opacity=".9"/>`;
  s+=`<text x="150" y="23" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="500" fill="#C9A84C" letter-spacing=".12em">STAGE</text>`;
  // Dance floor (centre of room)
  s+=`<rect x="90" y="110" width="120" height="90" rx="3" fill="none" stroke="#C9A84C" stroke-width="1" stroke-dasharray="4 3" opacity=".4"/>`;
  s+=`<text x="150" y="158" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#C9A84C" opacity=".6" letter-spacing=".08em">DANCE FLOOR</text>`;

  for(const[n,p] of Object.entries(TPOS)){
    const num=parseInt(n),isHi=num===hi;
    const cx=p.x,cy=p.y,r=isHi?17:12;
    if(isHi){
      s+=`<circle cx="${cx}" cy="${cy}" r="26" fill="#C9A84C" opacity=".12"/>`;
      s+=`<circle cx="${cx}" cy="${cy}" r="21" fill="#C9A84C" opacity=".12"/>`;
    }
    s+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${isHi?'#C9A84C':'#2A2420'}" stroke="${isHi?'#E8D5A3':'#4A3D35'}" stroke-width="${isHi?2:1}"/>`;
    s+=`<text x="${cx}" y="${cy+4}" text-anchor="middle" font-family="'Cormorant Garamond',Georgia,serif" font-size="${isHi?13:10}" font-weight="${isHi?'600':'400'}" fill="${isHi?'#1C1712':'#FAF8F4'}">${num}</text>`;
    if(isHi){
      s+=`<rect x="${cx-20}" y="${cy+20}" width="40" height="13" rx="3" fill="#C9A84C"/>`;
      s+=`<text x="${cx}" y="${cy+29}" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" font-weight="600" fill="#1C1712" letter-spacing=".1em">YOUR TABLE</text>`;
    }
  }
  s+=`</svg>`;
  return s;
}

// ── FUZZY SEARCH ─────────────────────────────────────────────────────────────
function norm(s){return s.toLowerCase().replace(/[^a-z0-9 ]/g,'').trim()}

function score(query,target){
  const q=norm(query),t=norm(target);
  if(!q)return 0;
  if(t===q)return 100;
  if(t.startsWith(q))return 90;
  if(t.includes(q))return 80;
  const qt=q.split(' ').filter(x=>x.length>1);
  const tt=t.split(' ').filter(Boolean);
  let hits=0;
  for(const a of qt){for(const b of tt){if(b.startsWith(a)||b.includes(a)){hits++;break}}}
  if(hits===qt.length&&qt.length>0)return 70;
  if(hits>0)return 40+(hits/Math.max(qt.length,1))*20;
  if(tt.some(b=>b.startsWith(q.split(' ')[0]||'')))return 35;
  return 0;
}

// ── RENDER ───────────────────────────────────────────────────────────────────
const inp=document.getElementById('searchInput');
const clr=document.getElementById('clearBtn');
const res=document.getElementById('results');
const hint=document.getElementById('hint');

function render(q){
  clr.classList.toggle('visible',q.length>0);
  if(!q.trim()){
    hint.textContent='Search by first name, last name, or both';
    res.innerHTML=`<div class="idle-state">
      <svg class="idle-ring" viewBox="0 0 64 64" fill="none" aria-hidden="true">
        <circle cx="32" cy="32" r="26" stroke="#C9A84C" stroke-width="1.2" opacity=".4"/>
        <circle cx="32" cy="32" r="18" stroke="#C9A84C" stroke-width=".8" opacity=".25"/>
        <text x="32" y="37" text-anchor="middle" font-family="'Cormorant Garamond',Georgia,serif" font-size="17" fill="#C9A84C" opacity=".65">♡</text>
      </svg>
      <h2>Welcome</h2>
      <p>Type your name above to find your table tonight.</p>
    </div>`;
    return;
  }
  const hits=GUESTS.map(g=>({...g,s:score(q,g.name)}))
    .filter(g=>g.s>=35).sort((a,b)=>b.s-a.s).slice(0,5);

  if(!hits.length){
    hint.textContent='';
    res.innerHTML=`<div class="no-results">
      <p>No match for <strong>"${q.replace(/</g,'&lt;')}"</strong>.<br>Try just your first or last name.</p>
    </div>`;
    return;
  }
  hint.textContent='';
  let html=hits.length>1?`<p class="results-count">${hits.length} matches — tap yours</p>`:'';
  hits.forEach((g,i)=>{
    const mates=TABLES[g.t].filter(n=>n!==g.name);
    const tmHtml=mates.map(n=>`<div class="tm-item">${n}</div>`).join('')
      +`<div class="tm-item me">★ ${g.name}</div>`;
    html+=`<div class="result-card" style="animation-delay:${i*.04}s">
      <div class="card-top">
        <div class="table-badge"><span class="lbl">Table</span><span class="num">${g.t}</span></div>
        <div class="card-info">
          <div class="guest-name">${g.name}</div>
          <div class="seat-desc">${TDESC[g.t]}</div>
        </div>
      </div>
      <button class="map-toggle" type="button" onclick="toggleMap(this)">
        <span>Show on floor map</span><span class="chevron">▾</span>
      </button>
      <div class="map-panel">${buildMap(g.t)}
        <div class="tablemates">
          <div class="tm-label">Your tablemates</div>
          <div class="tm-grid">${tmHtml}</div>
        </div>
      </div>
    </div>`;
  });
  res.innerHTML=html;
}

function toggleMap(btn){
  btn.classList.toggle('open');
  btn.nextElementSibling.classList.toggle('open');
}

inp.addEventListener('input',e=>render(e.target.value));
clr.addEventListener('click',()=>{inp.value='';inp.focus();render('');});

// QR modal
const overlay=document.getElementById('qrOverlay');
document.getElementById('qrBtn').addEventListener('click',()=>overlay.classList.add('open'));
document.getElementById('qrClose').addEventListener('click',()=>overlay.classList.remove('open'));
overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.classList.remove('open');});

// Update QR URL display with actual page URL
const urlDisplay=document.getElementById('qrUrlText');
if(location.href&&!location.href.includes('file://')){
  urlDisplay.textContent=location.href.replace(/^https?:\/\//,'');
}

// Initial render
render('');
</script>
</body>
